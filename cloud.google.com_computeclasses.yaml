                                  host:
                                    description: The hostname of the host.
                                    minLength: 1
                                    type: string
                                  ip:
                                    description: The IPv4 or IPv6 address of the host.
                                    minLength: 1
                                    type: string
                                required:
                                - host
                                - ip
                                type: object
                              type: array
                            additionalEtcResolvConf:
                              description: Additional entries to be added to /etc/resolv.conf.
                              items:
                                description: ResolvedConfEntry defines an entry in
                                  resolved.conf.
                                properties:
                                  key:
                                    description: The key of resolved.conf
                                    minLength: 1
                                    type: string
                                  value:
                                    description: The value of resolved.conf
                                    items:
                                      type: string
                                    maxItems: 256
                                    type: array
                                required:
                                - key
                                type: object
                              type: array
                            additionalEtcSystemdResolvedConf:
                              description: Additional entries to be added to /etc/systemd/resolved.conf.
                              items:
                                description: ResolvedConfEntry defines an entry in
                                  resolved.conf.
                                properties:
                                  key:
                                    description: The key of resolved.conf
                                    minLength: 1
                                    type: string
                                  value:
                                    description: The value of resolved.conf
                                    items:
                                      type: string
                                    maxItems: 256
                                    type: array
                                required:
                                - key
                                type: object
