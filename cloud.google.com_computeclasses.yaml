                                  The value must be positive and less than 10%.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              memoryAvailable:
                                description: |-
                                  MemoryAvailable is the minimum reclaim for memory.available.
                                  The value must be a percentage, e.g., "5%".
                                  The value must be positive and less than 10%.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              nodefsAvailable:
                                description: |-
                                  NodefsAvailable is the minimum reclaim for nodefs.available.
                                  The value must be a percentage, e.g., "5%".
                                  The value must be positive and less than 10%.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              nodefsInodesFree:
                                description: |-
                                  NodefsInodesFree is the minimum reclaim for nodefs.inodesFree.
                                  The value must be a percentage, e.g., "5%".
                                  The value must be positive and less than 10%.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              pidAvailable:
                                description: |-
                                  PidAvailable is the minimum reclaim for pid.available.
                                  The value must be a percentage, e.g., "5%".
                                  The value must be positive and less than 10%.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                            type: object
                          evictionSoft:
                            description: EvictionSoft defines soft eviction thresholds.
                            properties:
                              imagefsAvailable:
                                description: |-
                                  ImagefsAvailable is the soft eviction threshold for imagefs.available.
                                  The value must be a percentage. Eg. "10%".
                                  The value must be between 15% and 50% inclusive.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              imagefsInodesFree:
                                description: |-
                                  ImagefsInodesFree is the soft eviction threshold for imagefs.inodesFree.
                                  The value must be a percentage. Eg. "5%".
                                  The value must be between 5% and 50% inclusive.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              memoryAvailable:
                                description: |-
                                  MemoryAvailable is the soft eviction threshold for memory.available.
                                  The value must be a quantity, e.g., "100Mi".
                                  The value must be greater than the GKE default hard eviction threshold of 100Mi and less than 50% of machine memory.
                                pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi)$
                                type: string
                              nodefsAvailable:
                                description: |-
                                  NodefsAvailable is the soft eviction threshold for nodefs.available.
                                  The value must be a percentage, e.g., "20%".
                                  The value must be between 10% and 50% inclusive.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              nodefsInodesFree:
                                description: |-
                                  NodefsInodesFree is the soft eviction threshold for nodefs.inodesFree.
                                  The value must be a percentage. Eg. "5%".
                                  The value must be between 5% and 50% inclusive.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                              pidAvailable:
                                description: |-
                                  PidAvailable is the soft eviction threshold for pid.available.
                                  The value must be a percentage. Eg. "10%".
                                  The value must be between 10% and 50% inclusive.
                                pattern: ^[0-9]+(\.[0-9]+)?%$
                                type: string
                            type: object
                          evictionSoftGracePeriod:
                            description: EvictionSoftGracePeriod defines grace periods
                              for soft eviction thresholds.
                            properties:
                              imagefsAvailable:
                                description: |-
                                  ImagefsAvailable is the grace period for the imagefs.available soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                              imagefsInodesFree:
                                description: |-
                                  ImagefsInodesFree is the grace period for the imagefs.inodesFree soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                              memoryAvailable:
                                description: |-
                                  MemoryAvailable is the grace period for the memory.available soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                              nodefsAvailable:
                                description: |-
                                  NodefsAvailable is the grace period for the nodefs.available soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                              nodefsInodesFree:
                                description: |-
                                  NodefsInodesFree is the grace period for the nodefs.inodesFree soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                              pidAvailable:
                                description: |-
                                  PidAvailable is the grace period for the pid.available soft eviction threshold.
                                  The value must be a duration string. Eg. "30s", "1m30s".
                                  The value must be positive and less than '5m'.
                                pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                                type: string
                            type: object
                          imageGcHighThresholdPercent:
                            description: |-
                              This setting sets the percent of disk usage after which image garbage collection is always
                              run. The percent is calculated as this field value out of 100. Default is 85 if unspecified.
                            format: int64
                            maximum: 85
                            minimum: 11
                            type: integer
                          imageGcLowThresholdPercent:
                            description: |-
                              This setting sets the percent of disk usage before which image garbage collection is never
                              run. Lowest disk usage to garbage collect to. The percent is calculated as
                              this field value out of 100. Default is 80 if unspecified.
                            format: int64
                            maximum: 84
                            minimum: 10
                            type: integer
                          imageMaximumGcAge:
                            description: |-
                              This setting sets the maximum age an image can be unused before it is garbage collected.
                              The string must be a decimal number with a unit suffix, such as "300s", "1.5h", and "2h45m".
                              Valid time units are "ns", "us" (or "µs"), "ms", "s", "m", "h".
                              The value must be a positive duration.
                              Default is "0s" if unspecified, which disables the field.
                            pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                            type: string
                          imageMinimumGcAge:
                            description: |-
                              This setting sets the minimum age for an unused image before it is garbage collected.
                              The string must be a decimal number with a unit suffix, such as "300s", "1.5h", and "2h45m".
                              Valid time units are "ns", "us" (or "µs"), "ms", "s", "m", "h".
                              The value must be a positive duration and less than or equal to 2 minutes.
                              Default is "2m" if unspecified.
                            pattern: ^([0-9]+([.][0-9]+)?(ns|us|µs|ms|s|m|h))+$
                            type: string
                          maxParallelImagePulls:
                            description: This setting sets the maximum number of image
                              pulls in parallel. Default is 2 or 3 depending on boot
                              disk type.
                            format: int64
                            maximum: 5
                            minimum: 2
                            type: integer
                          memoryManager:
                            description: MemoryManager contains the configuration
                              for the Kubelet Memory Manager.
                            properties:
                              policy:
                                description: |-
                                  Policy controls the Kubelet's Memory Manager policy.
                                  The Static policy is required for the Topology Manager to perform memory affinity alignment.
                                  Policies:
                                  * None: (default) The Kubelet does not perform any memory alignment.
                                  * Static: The Kubelet allows pods in the Guaranteed QoS class to be granted memory from a single NUMA node.
                                enum:
                                - None
                                - Static
                                type: string
                            type: object
                          podPidsLimit:
                            description: This setting sets the maximum number of process
                              IDs (PIDs) that each Pod can use.
                            format: int64
                            maximum: 4194304
                            minimum: 1024
                            type: integer
                          shutdownGracePeriodCriticalPodsSeconds:
                            description: |-
                              ShutdownGracePeriodCriticalPodsSeconds is the maximum allowed grace period
                              (in seconds) that is used to terminate critical pods during a node shutdown.
                              This value should be <= ShutdownGracePeriodSeconds, and is only valid if ShutdownGracePeriodSeconds is set.
                            format: int32
                            maximum: 120
                            minimum: 0
                            type: integer
                          shutdownGracePeriodSeconds:
                            description: |-
                              ShutdownGracePeriodSeconds is the maximum allowed grace period
                              (in seconds) that the node should delay the shutdown during a graceful shutdown.
                            enum:
                            - 0
                            - 30
                            - 120
                            format: int32
                            type: integer
                          singleProcessOOMKill:
                            description: |-
                              This setting sets whether to enable single process OOM killer.
                              If set to true, the processes in a container will be OOM killed individually instead of as a group.
                            type: boolean
                          topologyManager:
                            description: TopologyManager contains the configuration
                              for the Kubelet Topology Manager.
                            properties:
                              policy:
                                description: |-
                                  Policy controls the Kubelet's Topology Manager policy.
                                  Policies:
                                  * none: (default) The Kubelet does not perform any topology alignment.
                                  * best-effort: The Kubelet will attempt to align resources but will not fail pod admission.
                                  * restricted: The Kubelet will reject pods that do not align to the minimal number of NUMA domains.
                                  * single-numa-node: The Kubelet will reject pods that do not align to a single NUMA domain.
                                enum:
                                - none
                                - best-effort
                                - restricted
                                - single-numa-node
                                type: string
                              scope:
                                description: |-
                                  Scope controls the Kubelet's Topology Manager scope.
                                  Scopes:
                                  * container: (default) The Kubelet performs topology alignment for each container in a pod.
                                  * pod: The Kubelet performs topology alignment for the pod as a whole. This setting ensures pod-level topology alignment, where the Topology Manager treats all containers as a single unit to place them on a common set of NUMA nodes.
                                enum:
                                - container
                                - pod
                                type: string
                            type: object
                        type: object
                        x-kubernetes-validations:
                        - message: ImageGcLowThresholdPercent must be lower than imageGcHighThresholdPercent
                          rule: 'has(self.imageGcHighThresholdPercent)&&has(self.imageGcLowThresholdPercent)
                            ? self.imageGcHighThresholdPercent>self.imageGcLowThresholdPercent
                            : true'
                        - message: ImageGcHighThresholdPercent must be higher than
                            80 which is default value of imageGcLowThresholdPercent
                          rule: 'has(self.imageGcHighThresholdPercent)&&!has(self.imageGcLowThresholdPercent)
                            ? self.imageGcHighThresholdPercent>80 : true'
                        - message: ShutdownGracePeriodCriticalPodsSeconds must be
                            less than or equal to ShutdownGracePeriodSeconds and requires
                            ShutdownGracePeriodSeconds to be set
                          rule: '!has(self.shutdownGracePeriodCriticalPodsSeconds)
                            || (has(self.shutdownGracePeriodSeconds) && self.shutdownGracePeriodCriticalPodsSeconds
                            <= self.shutdownGracePeriodSeconds)'
                      linuxNodeConfig:
                        description: LinuxNodeConfig defines linux node config for
                          a node.
                        properties:
                          additionalEtcHosts:
                            description: Additional entries to be added to /etc/hosts.
                            items:
                              description: EtcHostsEntry defines an entry in /etc/hosts.
                              properties:
                                host:
                                  description: The hostname of the host.
                                  minLength: 1
                                  type: string
                                ip:
                                  description: The IPv4 or IPv6 address of the host.
                                  minLength: 1
                                  type: string
                              required:
                              - host
                              - ip
                              type: object
                            type: array
                          additionalEtcResolvConf:
                            description: Additional entries to be added to /etc/resolv.conf.
                            items:
                              description: ResolvedConfEntry defines an entry in resolved.conf.
                              properties:
                                key:
                                  description: The key of resolved.conf
                                  minLength: 1
                                  type: string
                                value:
                                  description: The value of resolved.conf
                                  items:
                                    type: string
                                  maxItems: 256
                                  type: array
                              required:
                              - key
                              type: object
                            type: array
                          additionalEtcSystemdResolvedConf:
                            description: Additional entries to be added to /etc/systemd/resolved.conf.
                            items:
                              description: ResolvedConfEntry defines an entry in resolved.conf.
                              properties:
                                key:
                                  description: The key of resolved.conf
                                  minLength: 1
                                  type: string
                                value:
                                  description: The value of resolved.conf
                                  items:
                                    type: string
                                  maxItems: 256
                                  type: array
                              required:
                              - key
                              type: object
                            type: array
                          customNodeInit:
                            description: Support for running custom init code while
                              bootstrapping nodes.
                            properties:
                              initScript:
                                description: The init script to be executed on the
                                  node.
                                properties:
                                  args:
                                    description: Optional arguments to be passed to
                                      the init script.
                                    items:
                                      maxLength: 512
                                      minLength: 1
                                      type: string
                                    maxItems: 50
                                    type: array
                                  gcpSecretManagerSecretUri:
                                    description: The resource name of the secret manager
                                      secret hosting the init script.
                                    maxLength: 256
                                    type: string
                                  gcsGeneration:
                                    description: The generation of the init script
                                      stored in GCS.
                                    format: int64
                                    type: integer
                                  gcsUri:
                                    description: The Cloud Storage URI for storing
                                      the init script.
                                    maxLength: 1024
                                    type: string
                                type: object
                            type: object
                          hugepageConfig:
                            description: HugepagesConfig defines hugepages config
                              for a node.
                            properties:
                              hugepage_size1g:
                                description: Number of 1-gigabyte-sized huge pages
                                  to allocate.
                                format: int64
                                minimum: 1
                                type: integer
                              hugepage_size2m:
                                description: Number of 2-megabyte-sized huge pages
                                  to allocate.
                                format: int64
                                minimum: 1
                                type: integer
                            type: object
                          kernelOverrides:
                            description: Parameters that can be configured on the
                              kernel.
                            properties:
                              kernelCommandlineOverrides:
                                description: Optional kernel command line arguments
                                  overrides.
                                properties:
                                  initOnAlloc:
                                    description: Defines the change of init_on_alloc.
                                    enum:
                                    - INIT_ON_ALLOC_UNSPECIFIED
                                    - INIT_ON_ALLOC_OFF
                                    type: string
                                  specRstackOverflow:
                                    description: Defines the change of spec_rstack_overflow.
                                    enum:
                                    - SPEC_RSTACK_OVERFLOW_UNSPECIFIED
                                    - SPEC_RSTACK_OVERFLOW_OFF
                                    type: string
                                type: object
                              lruGen:
                                description: LRU Gen (Multi-Gen LRU) options.
                                properties:
                                  enabled:
                                    description: Enable LRU Gen.
                                    type: boolean
                                  minTtlMs:
                                    description: Prevent working set of N milliseconds
                                      from getting evicted.
                                    format: int32
                                    type: integer
                                type: object
                            type: object
                          swapConfig:
                            description: SwapConfig specifies the swap memory configuration
                              for a node pool.
                            properties:
                              bootDiskProfile:
                                description: Use the node's boot disk for swap.
                                properties:
                                  swapSizeGib:
                                    description: The size of the swap space in GiB.
                                    format: int64
                                    minimum: 1
                                    type: integer
                                  swapSizePercent:
                                    description: The size of the swap space as a percentage
                                      of the node's boot disk.
                                    format: int32
                                    maximum: 50
                                    minimum: 1
                                    type: integer
                                type: object
                                x-kubernetes-validations:
                                - message: only one of swapSizeGib or swapSizePercent
                                    may be set
                                  rule: '(has(self.swapSizeGib) ? 1 : 0) + (has(self.swapSizePercent)
                                    ? 1 : 0) <= 1'
                              dedicatedLocalSsdProfile:
                                description: Provision a new, separate local NVMe
                                  SSD exclusively for swap.
                                properties:
                                  diskCount:
                                    description: The number of physical local NVMe
                                      SSD disks to attach.
                                    format: int64
                                    minimum: 1
                                    type: integer
                                type: object
                              enabled:
                                description: Enables or disables swap for the node
                                  pool. Default to false.
                                type: boolean
                              encryptionConfig:
                                description: If omitted, swap space is encrypted by
                                  default.
                                properties:
                                  disabled:
                                    description: |-
                                      If true, swap space will NOT be encrypted.
                                      Defaults to false, swap space is encrypted by default.
                                    type: boolean
                                type: object
                              ephemeralLocalSsdProfile:
                                description: Use the local SSD (shared with ephemeral
                                  storage) for swap.
                                properties:
                                  swapSizeGib:
                                    description: The size of the swap space in GiB.
                                    format: int64
                                    minimum: 1
                                    type: integer
                                  swapSizePercent:
                                    description: The size of the swap space as a percentage
                                      of the node's ephemeral storage local SSDs.
                                    format: int32
                                    maximum: 80
                                    minimum: 1
                                    type: integer
                                type: object
                                x-kubernetes-validations:
                                - message: only one of swapSizeGib or swapSizePercent
                                    may be set
                                  rule: '(has(self.swapSizeGib) ? 1 : 0) + (has(self.swapSizePercent)
