                                format: int64
                                maximum: 100
                                minimum: 0
                                type: integer
                              vm.watermark_scale_factor:
                                format: int64
                                maximum: 3000
                                minimum: 10
                                type: integer
                            type: object
                          timeZone:
                            description: Configures the timezone of the node.
                            maxLength: 256
                            type: string
                          transparentHugepageDefrag:
                            description: |-
                              Defines the transparent hugepage defrag configuration on the node. Currently supported values:
                              * TRANSPARENT_HUGEPAGE_DEFRAG_ALWAYS: An application requesting THP will stall on allocation failure and directly reclaim pages and compact memory in an effort to allocate a THP immediately.
                              * TRANSPARENT_HUGEPAGE_DEFRAG_DEFER: An application will wake kswapd in the background to reclaim pages and wake kcompactd to compact memory so that THP is available in the near future. It is the responsibility of khugepaged to then install the THP pages later.
                              * TRANSPARENT_HUGEPAGE_DEFRAG_DEFER_WITH_MADVISE: An application will enter direct reclaim and compaction like always, but only for regions that have used madvise(MADV_HUGEPAGE); all other regions will wake kswapd in the background to reclaim pages and wake kcompactd to compact memory so that THP is available in the near future.
                              * TRANSPARENT_HUGEPAGE_DEFRAG_MADVISE: An application will enter direct reclaim and compaction like always, but only for regions that have used madvise(MADV_HUGEPAGE); all other regions will wake kswapd in the background to reclaim pages and wake kcompactd to compact memory so that THP is available in the near future.
                              * TRANSPARENT_HUGEPAGE_DEFRAG_NEVER: An application will never enter direct reclaim or compaction.
                              * TRANSPARENT_HUGEPAGE_DEFRAG_UNSPECIFIED: Default value. GKE will not modify the kernel configuration.
                            enum:
                            - TRANSPARENT_HUGEPAGE_DEFRAG_ALWAYS
                            - TRANSPARENT_HUGEPAGE_DEFRAG_DEFER
                            - TRANSPARENT_HUGEPAGE_DEFRAG_DEFER_WITH_MADVISE
                            - TRANSPARENT_HUGEPAGE_DEFRAG_MADVISE
                            - TRANSPARENT_HUGEPAGE_DEFRAG_NEVER
                            - TRANSPARENT_HUGEPAGE_DEFRAG_UNSPECIFIED
                            type: string
                          transparentHugepageEnabled:
                            description: |-
                              Controls transparent hugepage support for anonymous memory. Currently supported values:
                              * TRANSPARENT_HUGEPAGE_ENABLED_ALWAYS: Transparent hugepage is enabled system wide.
                              * TRANSPARENT_HUGEPAGE_ENABLED_MADVISE: Transparent hugepage is enabled inside MADV_HUGEPAGE regions. This is the default kernel configuration.
                              * TRANSPARENT_HUGEPAGE_ENABLED_NEVER: Transparent hugepage is disabled.
                              * TRANSPARENT_HUGEPAGE_ENABLED_UNSPECIFIED: Default value. GKE will not modify the kernel configuration.
                            enum:
                            - TRANSPARENT_HUGEPAGE_ENABLED_ALWAYS
                            - TRANSPARENT_HUGEPAGE_ENABLED_MADVISE
                            - TRANSPARENT_HUGEPAGE_ENABLED_NEVER
                            - TRANSPARENT_HUGEPAGE_ENABLED_UNSPECIFIED
                            type: string
                        type: object
                    type: object
                type: object
              whenUnsatisfiable:
                default: DoNotScaleUp
                description: |-
                  WhenUnsatisfiable describes autoscaler behaviour in case none
                  of the provided priorities is satisfiable.
                  Currently supported values:
                  * ScaleUpAnyway
                  * DoNotScaleUp
                enum:
                - ScaleUpAnyway
                - DoNotScaleUp
                type: string
            required:
            - whenUnsatisfiable
            type: object
            x-kubernetes-validations:
            - message: Autopilot is required once set
              rule: '!has(oldSelf.autopilot) || has(self.autopilot)'
            - message: Nodepools priority cannot be used when Autopilot is enabled
              rule: '(has(self.autopilot) && self.autopilot.enabled) ? !self.priorities.exists(priority,
                has(priority.nodepools)) : true'
            - message: NodePoolAutoCreation cannot be disabled when Autopilot is enabled
              rule: '(has(self.autopilot) && self.autopilot.enabled) ? !(has(self.nodePoolAutoCreation)
                && !self.nodePoolAutoCreation.enabled) : true'
            - message: Only cos_containerd image type can be used when Autopilot is
                enabled
              rule: '(has(self.autopilot) && self.autopilot.enabled) ? (!has(self.nodePoolConfig)
                || !has(self.nodePoolConfig.imageType) || self.nodePoolConfig.imageType
                == "cos_containerd") : true'
            - message: Only DEFAULT logging variant can be used when Autopilot is
                enabled
              rule: '(has(self.autopilot) && self.autopilot.enabled) ? (!has(self.nodePoolConfig)
                || !has(self.nodePoolConfig.loggingConfig) || !has(self.nodePoolConfig.loggingConfig.loggingVariantConfig)
                || !has(self.nodePoolConfig.loggingConfig.loggingVariantConfig.variant)
                || self.nodePoolConfig.loggingConfig.loggingVariantConfig.variant
                == "DEFAULT") : true'
            - message: If NodePoolGroup is not specified NodePoolConfig.WorkloadType
                can only be HIGH_AVAILABILITY if set
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.workloadType)
                && !has(self.nodePoolGroup)) ? self.nodePoolConfig.workloadType ==
                "HIGH_AVAILABILITY" : true'
            - message: In GKE Standard, pod family can be used only if Autopilot is
                enabled
              rule: 'self.priorities.exists(priority, has(priority.podFamily)) ? (has(self.autopilot)
                && self.autopilot.enabled) : true'
            - message: If using NodePoolConfig.ConfidentialNodeType, each priority
                must specify either MachineFamily or MachineType.
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType))
                ? self.priorities.all(priority, has(priority.machineFamily) || has(priority.machineType))
                : true'
            - message: ConfidentialNodeType SEV only supports N2D, C2D, C3D, C4D
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "SEV") ? self.priorities.all(priority,
                ((has(priority.machineFamily) && priority.machineFamily in [''n2d'',
                ''c2d'', ''c3d'', ''c4d'']) || (has(priority.machineType) && priority.machineType.split(''-'')[0]
                in [''n2d'', ''c2d'', ''c3d'', ''c4d'']))) : true'
            - message: ConfidentialNodeType SEV_SNP only supports N2D
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "SEV_SNP") ? self.priorities.all(priority,
                ((has(priority.machineFamily) && priority.machineFamily in [''n2d''])
                || (has(priority.machineType) && priority.machineType.split(''-'')[0]
                in [''n2d'']))) : true'
            - message: ConfidentialNodeType TDX only supports C3 standard, C4 standard,
                A3 and A4
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "TDX") ? self.priorities.all(priority,
                (has(priority.machineFamily) && priority.machineFamily in [''c3'',
                ''c4'', ''a3'', ''a4'']) || (has(priority.machineType) && (priority.machineType.startsWith(''c3-standard-'')
                || priority.machineType.startsWith(''c4-standard-'') || priority.machineType
                == ''a3-highgpu-1g'' || priority.machineType == ''a4-highgpu-8g'')))
                : true'
            - message: ConfidentialNodeType TDX on C3 only supports c3-standard- machine
                type and nvidia-h100-80gb GPU type
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "TDX") ? self.priorities.all(priority,
                (has(priority.machineFamily) && priority.machineFamily == ''c3'' ||
                has(priority.machineType) && priority.machineType.startsWith(''c3-standard-''))
                ? (!has(priority.gpu) || has(priority.gpu) && (!has(priority.gpu.type)
                || priority.gpu.type == ''nvidia-h100-80gb'')) : true) : true'
            - message: ConfidentialNodeType TDX on C4 only supports c4-standard- machine
                type and nvidia-h100-80gb GPU type
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "TDX") ? self.priorities.all(priority,
                (has(priority.machineFamily) && priority.machineFamily == ''c4'' ||
                has(priority.machineType) && priority.machineType.startsWith(''c4-standard-''))
                ? (!has(priority.gpu) || has(priority.gpu) && (!has(priority.gpu.type)
                || priority.gpu.type == ''nvidia-h100-80gb'')) : true) : true'
            - message: ConfidentialNodeType TDX on A3 only supports a3-highgpu-1g
                machine type and nvidia-h100-80gb GPU type
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "TDX") ? self.priorities.all(priority,
                (has(priority.machineFamily) && priority.machineFamily == ''a3'' ||
                has(priority.machineType) && priority.machineType == ''a3-highgpu-1g'')
                ? (!has(priority.gpu) || has(priority.gpu) && (!has(priority.gpu.type)
                || priority.gpu.type == ''nvidia-h100-80gb'')) : true) : true'
            - message: ConfidentialNodeType TDX on A4 only supports a4-highgpu-8g
                machine type and nvidia-b200 GPU type
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.nodePoolConfig.confidentialNodeType == "TDX") ? self.priorities.all(priority,
                (has(priority.machineFamily) && priority.machineFamily == ''a4'' ||
                has(priority.machineType) && priority.machineType == ''a4-highgpu-8g'')
                ? (!has(priority.gpu) || has(priority.gpu) && (!has(priority.gpu.type)
                || priority.gpu.type == ''nvidia-b200'')) : true) : true'
            - message: When using confidential GPUs you must specify location.zones
              rule: '(has(self.nodePoolConfig) && has(self.nodePoolConfig.confidentialNodeType)
                && self.priorities.exists(priority, has(priority.gpu))) ? (has(self.priorityDefaults)
                && has(self.priorityDefaults.location) && has(self.priorityDefaults.location.zones))
                || self.priorities.all(priority, has(priority.location) && has(priority.location.zones))
                : true'
            - message: PriorityScore must be set for all priorities or for none of
                them
              rule: self.priorities.all(p, has(p.priorityScore)) || self.priorities.all(p,
                !has(p.priorityScore))
            - message: GPU Topology is supported only for A4X machine family or nvidia-gb200
                GPU type together with placement (workload) policy
              rule: 'self.priorities.all(p, (has(p.gpu) && has(p.gpu.topology)) ?
                (((has(p.machineFamily) && p.machineFamily == ''a4x'') || (has(p.gpu.type)
                && p.gpu.type == ''nvidia-gb200'')) && has(p.placement) && has(p.placement.policyName))
                : true)'
            - message: shutdownGracePeriodSeconds is only supported for Spot
              rule: self.priorities.all(p, (has(p.spot) && p.spot)) || !has(self.priorityDefaults)
                || !has(self.priorityDefaults.nodeSystemConfig) || !has(self.priorityDefaults.nodeSystemConfig.kubeletConfig)
                || !has(self.priorityDefaults.nodeSystemConfig.kubeletConfig.shutdownGracePeriodSeconds)
            - message: Spec-level MinimumCapacity requires all priorities to have
                machine specifications (machineType, gpu, tpu, or specific reservation)
              rule: 'has(self.minimumCapacity) && has(self.minimumCapacity.targetNodeCount)
                ? self.priorities.all(p, has(p.machineType) || has(p.gpu) || has(p.tpu)
                || (has(p.reservations) && p.reservations.affinity == ''Specific''))
                : true'
          status:
            description: Status of the ComputeClass.
            properties:
              conditions:
                description: Conditions represent the observations of a ComputeClass's
                  current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
