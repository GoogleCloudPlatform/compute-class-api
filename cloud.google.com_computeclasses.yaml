                                  1: Allows overcommit until memory is exhausted.
                                  2 (strict): Prevents overcommit beyond swap space plus a percentage of RAM defined by 'vm.overcommit_ratio'.
                                enum:
                                - 0
                                - 1
                                - 2
                                format: int64
