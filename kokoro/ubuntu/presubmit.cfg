# Format: //devtools/kokoro/config/proto/build.proto

# Location of the presubmit bash script in repository.
build_file: "compute-class-api/kokoro/ubuntu/runner.sh"
container_properties {
  docker_image: "us-central1-docker.pkg.dev/kokoro-container-bakery/kokoro/ubuntu/ubuntu2204/full:current"
  docker_sibling_containers: true
}
env_vars: {
    key: "KOKORO_ROOT"
    value: "/tmpfs"
}